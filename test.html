<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>AI 감정 매칭 테스트</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 20px;
      width: 500px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }

    textarea {
      height: 100px;
      resize: none;
    }

    button {
      cursor: pointer;
      background: #222;
      color: white;
      border: none;
      border-radius: 6px;
    }

    #chatBox {
      height: 250px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 10px;
      background: #fafafa;
    }

    .message {
      margin-bottom: 8px;
    }

    .system {
      color: #777;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>AI 감정 매칭 테스트</h2>

    <input id="nickname" placeholder="닉네임 예: 익명토끼" />

    <textarea id="text" placeholder="고민 입력 예: 요즘 취업 준비 때문에 너무 불안해요."></textarea>

    <button onclick="requestMatching()">매칭 요청</button>
    <button onclick="cancelMatching()">매칭 취소</button>
  </div>

  <div class="box">
    <h3>상태</h3>
    <p id="status">서버 연결 전</p>

    <h3>분석 결과</h3>
    <pre id="analysis">아직 분석 결과 없음</pre>
  </div>

  <div class="box">
    <h3>채팅</h3>
    <div id="chatBox"></div>

    <input id="message" placeholder="메시지 입력" />
    <button onclick="sendMessage()">전송</button>
  </div>

  <script>
    const socket = io("http://localhost:4000");

    let currentRoomId = null;

    socket.on("connected", (data) => {
      document.getElementById("status").innerText = "서버 연결 완료";
      console.log("연결 정보:", data);
    });

    socket.on("matching:waiting", (data) => {
      document.getElementById("status").innerText = data.message;
      document.getElementById("analysis").innerText =
        JSON.stringify(data.aiResult, null, 2);
    });

    socket.on("matching:success", (data) => {
      currentRoomId = data.roomId;

      document.getElementById("status").innerText =
        "매칭 성공! 방 번호: " + data.roomId;

      addChat("SYSTEM", data.message, true);

      console.log("매칭 성공 데이터:", data);
    });

    socket.on("matching:error", (data) => {
      document.getElementById("status").innerText = data.message;
    });

    socket.on("matching:cancelled", (data) => {
      document.getElementById("status").innerText = data.message;
    });

    socket.on("chat:message", (data) => {
      addChat(data.nickname, data.message, false);
    });

    socket.on("chat:system", (data) => {
      addChat("SYSTEM", data.message, true);
    });

    function requestMatching() {
      const nickname = document.getElementById("nickname").value || "익명";
      const text = document.getElementById("text").value;

      if (!text.trim()) {
        alert("고민 내용을 입력해줘.");
        return;
      }

      socket.emit("matching:request", {
        nickname,
        text,
      });

      document.getElementById("status").innerText = "감정 분석 중...";
    }

    function cancelMatching() {
      socket.emit("matching:cancel");
    }

    function sendMessage() {
      const nickname = document.getElementById("nickname").value || "익명";
      const message = document.getElementById("message").value;

      if (!currentRoomId) {
        alert("아직 매칭되지 않았어.");
        return;
      }

      if (!message.trim()) {
        alert("메시지를 입력해줘.");
        return;
      }

      socket.emit("chat:message", {
        roomId: currentRoomId,
        nickname,
        message,
      });

      document.getElementById("message").value = "";
    }

    function addChat(nickname, message, isSystem) {
      const chatBox = document.getElementById("chatBox");

      const div = document.createElement("div");
      div.className = isSystem ? "message system" : "message";
      div.innerHTML = `<b>${nickname}</b>: ${message}`;

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
